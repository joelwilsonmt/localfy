services:
  localfy:
    image: ghcr.io/joelwilsonmt/localfy:latest
    # For local development (build from source instead of pulling), comment out
    # the `image:` line above and uncomment:
    # build: .
    ports:
      # Default binds all interfaces. For Tailscale (or any reverse proxy on the
      # same host), set BIND_ADDR=127.0.0.1 in .env so nothing is reachable except
      # via the proxy.
      - "${BIND_ADDR:-0.0.0.0}:8080:8080"
    volumes:
      - ${MUSIC_HOST_PATH:-./music}:/music
      - ${DATA_HOST_PATH:-./data}:/data
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:8080/auth/callback}
      - DOWNLOAD_PATH=${DOWNLOAD_PATH:-/music}
      - DATA_PATH=${DATA_PATH:-/data}
      - AUDIO_FORMAT=${AUDIO_FORMAT:-mp3}
      - AUDIO_BITRATE=${AUDIO_BITRATE:-320k}
    restart: unless-stopped
