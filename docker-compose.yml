services:
  localfy:
    build: .
    # To use the pre-built image instead of building locally, comment out `build: .`
    # and uncomment the line below (replace with your repo):
    # image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest
    ports:
      - "8080:8080"
    volumes:
      - ${MUSIC_HOST_PATH:-./music}:/music
      - ${DATA_HOST_PATH:-./data}:/data
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:8080/auth/callback}
      - DOWNLOAD_PATH=${DOWNLOAD_PATH:-/music}
      - DATA_PATH=${DATA_PATH:-/data}
      - AUDIO_FORMAT=${AUDIO_FORMAT:-mp3}
      - AUDIO_BITRATE=${AUDIO_BITRATE:-320k}
    restart: unless-stopped
