<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localfy</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="landing">
  <div>
    <h1>local<span>fy</span></h1>
    <p>Your Spotify playlists and liked songs, downloaded automatically to your server.</p>
  </div>

  {% if error %}
  <div class="error-banner">Spotify login was cancelled or denied. Please try again.</div>
  {% endif %}

  <a href="/auth/login" class="btn-spotify">
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.793c3.563-1.081 9.484-.872 13.22 1.35a.937.937 0 01-.06 1.6z"/>
    </svg>
    Connect with Spotify
  </a>

  <p style="font-size:.8rem; color: var(--muted);">
    You'll need a free <a href="https://developer.spotify.com/dashboard" target="_blank">Spotify Developer app</a>
    with its credentials set in your <code>.env</code> file.
  </p>
</div>
</body>
</html>
